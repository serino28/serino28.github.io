<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="google-site-verification" content="H2FDUW2UQAyeIjZfzPBkltXASO2dVUTshOn91kEAvY0" />
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- No-flash theme: enable JS styling + apply saved/system theme before paint -->
  <script>
    (function () {
      var d = document.documentElement;
      d.classList.remove('no-js');
      d.classList.add('js');
      try {
        var t = localStorage.getItem('theme');
        if (!t) {
          t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        d.setAttribute('data-theme', t);
      } catch (e) {
        d.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/img/Antonio.jpeg' | absolute_url }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="scroll-progress" id="scroll-progress"></div>
  {% include nav.html %}
  
  <main>
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <!-- Scripts -->
  <script src="{{ '/assets/vendor/globe.gl.min.js' | relative_url }}"></script>
  <script src="{{ '/assets/vendor/three.min.js' | relative_url }}"></script>
  <script src="{{ '/assets/vendor/OrbitControls.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/latent-points.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
